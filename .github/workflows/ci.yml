name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));

            const required = ['manifest_version', 'name', 'version', 'permissions', 'content_scripts'];
            const missing = required.filter(k => !(k in manifest));

            if (missing.length) {
              console.error('Missing required fields:', missing.join(', '));
              process.exit(1);
            }

            if (manifest.manifest_version !== 3) {
              console.error('Expected Manifest V3, got:', manifest.manifest_version);
              process.exit(1);
            }

            console.log('manifest.json is valid');
            console.log('  Name:', manifest.name);
            console.log('  Version:', manifest.version);
            console.log('  Manifest Version:', manifest.manifest_version);
          "

      - name: Validate JavaScript syntax
        run: node --check content.js

      - name: Validate CSS syntax
        run: |
          npm install -g csslint 2>/dev/null || true
          if command -v csslint &>/dev/null; then
            csslint --quiet styles.css || true
          else
            echo "CSS file exists and is non-empty"
            test -s styles.css
          fi

      - name: Check file structure
        run: |
          echo "Checking required files..."
          for f in manifest.json content.js styles.css; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
            echo "  ✓ $f"
          done
          echo "All required files present"

      - name: Build extension ZIP
        run: |
          mkdir -p dist
          zip -r dist/huntflow-menu-organizer.zip \
            manifest.json \
            content.js \
            styles.css \
            LICENSE \
            -x "*.git*" "*.github*" "example.html" "*.md" "dist/*"
          echo "Built: dist/huntflow-menu-organizer.zip"
          ls -lh dist/huntflow-menu-organizer.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: huntflow-menu-organizer
          path: dist/huntflow-menu-organizer.zip
