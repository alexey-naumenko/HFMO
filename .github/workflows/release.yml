name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'alexey-naumenko/HFMO'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate manifest.json
        run: node --check content.js && node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"

      - name: Build extension ZIP
        run: |
          mkdir -p dist
          zip -r dist/huntflow-menu-organizer.zip \
            manifest.json \
            content.js \
            styles.css \
            LICENSE \
            -x "*.git*" "*.github*" "example.html" "*.md" "dist/*"

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
